strengths:
  - title: Multi-path partnership architecture
    description: "Four distinct partner programs (affiliate, content creator, referral, dealer) show strategic sophistication rare for a DTC brand this size."
  - title: Strong program discoverability (4/4)
    description: "Appears in 5+ 'best bicycle affiliate programs' roundups with clear, well-structured program pages."
  - title: High average order value ($550+)
    description: "Even at 5% commission, affiliates earn ~$27.50 per sale. E-bike sales yield $75-125 per conversion."
gaps:
  - title: No major network presence (0/4)
    description: "Absent from all 5 major affiliate networks. Recommendation: Launch on Impact or CJ to expand publisher pool."
  - title: Below-median cookie duration (2/4)
    description: "21-day cookie is problematic for high-consideration bicycle purchases. Recommendation: Extend to 30-45 days."
  - title: No membership commerce model (1/4)
    description: "Purely transactional with no recurring revenue opportunity. Recommendation: Launch a 'Priority Rider' membership at $49-99/year."
assessment: "Priority Bicycles scores 44/100 (Early band, top end) on the AFARE scale, reflecting a small DTC brand with thoughtful partnership strategy but limited affiliate infrastructure and scale. The brand punches above its weight in program discoverability and partnership architecture."
assessmentHighlight: "The clearest path to 60+ (Developing band) is: (1) launch on Impact or CJ, (2) extend cookie to 30-45 days, and (3) introduce tiered commission incentives."
