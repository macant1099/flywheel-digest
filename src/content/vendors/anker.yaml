      - name: Tiered/Performance Incentives
        score: 3
        maxScore: 4
        evidence: Nordics program offers 8-15% tiered by product type and sales volume. SuperChargers creator program provides non-commission incentives.
      - name: Product-Level Commission Strategy
        score: 3
        maxScore: 4
