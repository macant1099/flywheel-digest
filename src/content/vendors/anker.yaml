      - name: Private/Direct Programs
        score: 3
        maxScore: 4
        evidence: Direct affiliate at anker.com/become-an-affiliate via Impact, brand-specific tiers (Anker US 8%, AnkerWork separate, Anker SOLIX 5%). Separate referral program and SuperChargers creator program.
